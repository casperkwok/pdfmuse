name: release

# One tag drives all four ecosystems at the same version (PER-69).
# Push a tag like `v0.1.0` after bumping the workspace + package.json versions.
# Requires repo secrets: CARGO_REGISTRY_TOKEN, PYPI_API_TOKEN, NPM_TOKEN.
# NOTE: publish jobs need a first real-tag run to validate against each registry;
# treat this as the starting scaffold.
on:
  push:
    tags: ["v*"]

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          echo "tag=$tag cargo=$ver"
          test "$tag" = "$ver" || { echo "tag != workspace version"; exit 1; }

  crates:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p pdfmuse-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  python:
    needs: check-version
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --manifest-path crates/pdfmuse-python/Cargo.toml -o dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  python-publish:
    needs: python
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing (OIDC) — no token stored. Requires a one-time
    # publisher config on PyPI (project pdfmuse → Publishing → GitHub:
    # casperkwok/pdfmuse, workflow release.yml, environment pypi).
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # Build the native .node per target. Both macOS targets build on the arm64
  # runner (x86_64 via cross-compile) so we don't depend on scarce Intel-mac
  # runners. arm64 Linux + musl can be added later via cross/docker.
  node:
    needs: check-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: macos-14, target: x86_64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: bindings/node
        run: npm install && npx napi build --platform --release --target ${{ matrix.target }} --cargo-cwd ../../crates/pdfmuse-node --js native.js --dts native.d.ts
      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: bindings/node/native.*.node

  # Collect every platform binary, then publish the @pdfmuse/node-<triple> platform
  # packages (napi prepublish) + the main @pdfmuse/node package.
  node-publish:
    needs: node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - working-directory: bindings/node
        run: npm install
      # native.js loader + index.js (tsc) for the main package.
      - name: build loader + types
        working-directory: bindings/node
        run: npm run build
      # Each node-<target> artifact lands under artifacts/<name>/native.*.node.
      - uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: bindings/node/artifacts
      # Create npm/<platform>/ package dirs, then move each binary into its dir.
      - name: assemble platform packages
        working-directory: bindings/node
        run: |
          npx napi create-npm-dir -t .
          npx napi artifacts --dir artifacts --dist npm
          ls -R npm
      - name: publish platform packages + main
        working-directory: bindings/node
        run: |
          npx napi prepublish -t npm --skip-gh-release
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  wasm:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: wasm-pack build crates/pdfmuse-wasm --target web --release --out-dir pkg
      # wasm-pack names the package after the crate (pdfmuse-wasm); publish under
      # the reserved scoped name instead.
      - name: rename package to @pdfmuse/core
        working-directory: crates/pdfmuse-wasm/pkg
        run: node -e "const f='package.json',p=require('./'+f);p.name='@pdfmuse/core';require('fs').writeFileSync(f,JSON.stringify(p,null,2))"
      - working-directory: crates/pdfmuse-wasm/pkg
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Create the GitHub Release once the registry publishes have run.
  github-release:
    needs: [crates, python-publish, wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: create release
        run: gh release create "$GITHUB_REF_NAME" --title "pdfmuse $GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
