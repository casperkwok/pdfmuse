name: release

# One tag drives all four ecosystems at the same version (PER-69).
# Push a tag like `v0.1.0` after bumping the workspace + package.json versions.
# Requires repo secrets: CARGO_REGISTRY_TOKEN, PYPI_API_TOKEN, NPM_TOKEN.
# NOTE: publish jobs need a first real-tag run to validate against each registry;
# treat this as the starting scaffold.
on:
  push:
    tags: ["v*"]

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          echo "tag=$tag cargo=$ver"
          test "$tag" = "$ver" || { echo "tag != workspace version"; exit 1; }

  crates:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p pdfmuse-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  python:
    needs: check-version
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --manifest-path crates/pdfmuse-python/Cargo.toml -o dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  python-publish:
    needs: python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  node:
    needs: check-version
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - working-directory: bindings/node
        run: npm ci && npm run build:native
      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.os }}
          path: bindings/node/*.node
      # Publishing the platform packages + optionalDependencies is finalized via
      # napi-rs's `napi prepublish` once the full target matrix is set.

  wasm:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: wasm-pack build crates/pdfmuse-wasm --target web --release --out-dir pkg
      - working-directory: crates/pdfmuse-wasm/pkg
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
