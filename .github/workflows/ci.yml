name: ci

# Build gate: unit + snapshot + robustness tests and clippy on every push/PR.
# (Cross-binding byte-identical output is enforced separately by parity.yml.)
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # default-members = core + cli (binding cdylibs are built by their
      # packaging tools, not plain cargo).
      - run: cargo test
      - run: cargo test --features rayon
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # Build the native Node binding on every platform we ship (build-only; the
  # actual npm publish is exercised by release.yml on a tag).
  node-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: macos-14, target: x86_64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: bindings/node
        run: npm install && npx napi build --release --target ${{ matrix.target }} --cargo-cwd ../../crates/pdfmuse-node --js native.js --dts native.d.ts
      # Smoke-test only the host-native build (a cross-compiled binary won't load here).
      - if: matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'x86_64-pc-windows-msvc'
        working-directory: bindings/node
        run: node -e "const n=require('./native.js'); const fs=require('fs'); const d=JSON.parse(n.parse_buffer(fs.readFileSync('../../tests/corpus/hello.pdf'))); if(d.source!=='Pdf') process.exit(1); console.log('ok:', d.source)"
